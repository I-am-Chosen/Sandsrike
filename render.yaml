# ─────────────────────────────────────────────────────────────────────────────
# Sandsrike — Render.com Infrastructure Blueprint
# Deploy via: Render Dashboard → "New Blueprint" → connect this repo
#
# Architecture:
#   sandsrike-server   — Unity Dedicated Server (WebSocket game server)
#
# How it works:
#   1. GitHub push to 'main' triggers Render to rebuild the Docker image
#   2. Render starts the container, injects PORT env var
#   3. DedicatedServerBootstrap reads PORT and starts NetworkManager as Server
#   4. Clients connect via wss://sandsrike-server.onrender.com (port 443)
#      Render's load balancer handles TLS → proxies to container WS port
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: sandsrike-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # Render.com plan — upgrade to 'standard' for production (persistent disk, more RAM)
    plan: starter

    # Auto-deploy on every push to main
    autoDeploy: true
    branch: main

    # Render injects PORT automatically; these are extra runtime values
    envVars:
      - key: UNITY_SERVER
        value: "1"
      # Optional overrides — remove to use DedicatedServerBootstrap defaults
      # - key: MAX_PLAYERS
      #   value: "10"
      # - key: DEFAULT_MAP
      #   value: "GameScene"

    # Health check on root path.
    # Placeholder mode: Python HTTP server returns 200 OK immediately.
    # Production mode: Unity server handles WebSocket upgrade on the same port.
    healthCheckPath: /

    # Keep the server alive — game servers must not spin down
    numInstances: 1
